# Деплой прототипа (Vite) в GitHub Pages.
# Репозиторий должен называться так же, как base в prototype/vite.config.ts (сейчас /opiser-prototype/).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prototype/package-lock.json
      - name: Install and build
        working-directory: prototype
        run: npm ci && npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototype/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
